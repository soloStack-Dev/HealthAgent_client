services:
  - type: web
    name: health-agent-client
    runtime: static
    repo: https://github.com/soloStack-Dev/HealthAgent_client.git
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://healthagent-server.onrender.com
